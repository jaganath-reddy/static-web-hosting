name: static webhosting
on:
  push:
    branches: [ "master" ]

permissions:
contents: read
pages: write
id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

  steps:
    - name: cloning repo
      uses: actions/checkout@v4

    - name: setup github
      uses: actions/configure-pages@v6.0.0

    - name: uplod files to website
      uses: actions/upload-pages-artifact@v5.0.0
      with:
        path: .

    - name: deploy the website
      uses: actions/deploy-pages@v3.0.2-node.24
